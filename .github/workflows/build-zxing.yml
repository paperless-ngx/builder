name: Build ZXing Wheels
permissions:
  contents: read
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'ZXing version to build'
        required: true
        type: string
        default: "2.3.0"
      debian-release:
        description: "Debian release to use"
        type: choice
        options:
          - bookworm
          - trixie
      testing:
        description: 'Testing mode (build only, no release)'
        required: false
        type: boolean
        default: false
env:
  INPUTS_VERSION: ${{ inputs.version }}
  DEBIAN_RELEASE: ${{ inputs.debian-release }}
jobs:
  build-zxing:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04-arm
            arch: arm64
          - runner: ubuntu-24.04
            arch: x86_64
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Build zxing Docker image
        run: |
          docker build \
            --tag "zxing:${{ env.INPUTS_VERSION }}" \
            --build-arg DEBIAN_RELEASE="${{ env.DEBIAN_RELEASE }}" \
            --build-arg ZXING_VERSION="${{ env.INPUTS_VERSION }}" \
            --file zxing.dockerfile \
            --progress plain \
            .
      - name: Extract built wheels
        run: |
          image_id=$(docker create "zxing:${{ env.INPUTS_VERSION }}")
          mkdir -v -p outputs/zxing
          docker cp "${image_id}":/usr/src/zxing/ outputs/

          # List built files for verification
          find outputs/zxing -type f -name "*.whl" -o -name "*.tar.gz" | sort
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zxing-wheels-${{ inputs.version }}-${{ matrix.arch }}
          path: outputs/zxing/
          retention-days: 7
  create-release:
    if: ${{ !inputs.testing }}
    needs: build-zxing
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/
      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts
          find artifacts/ -name "*.whl" -o -name "*.tar.gz" | while read file; do
            cp "$file" release-artifacts/
          done
          ls -la release-artifacts/
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="zxing-${{ env.DEBIAN_RELEASE }}-${{ inputs.version }}"
          NOTES=$(cat <<EOF
          ## ZXing ${{ inputs.version }} Multi-architecture Wheels
          **Version:** ${{ inputs.version }}
          **Build Date:** ${{ steps.date.outputs.date }}
          **Commit:** ${{ github.sha }}
          **Actor:** ${{ github.actor }}
          EOF
          )
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" release-artifacts/* --clobber
          else
            gh release create "${TAG}" \
              --target "${{ github.sha }}" \
              --title "ZXing ${{ inputs.version }} (Multi-arch)" \
              --prerelease \
              --notes "${NOTES}" \
              release-artifacts/*
          fi
