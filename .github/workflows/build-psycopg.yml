name: Build Psycopg Wheels
permissions:
  contents: read
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Psycopg version to build'
        required: true
        type: string
        default: "3.3.0"
      debian-release:
        description: "Debian release to use"
        type: choice
        options:
          - trixie
          - bookworm
      testing:
        description: 'Testing mode (build only, no release)'
        required: false
        type: boolean
        default: false
env:
  INPUTS_VERSION: ${{ inputs.version }}
  DEBIAN_RELEASE: ${{ inputs.debian-release }}
jobs:
  build-psycopg:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04-arm
            arch: arm64
          - runner: ubuntu-24.04
            arch: x86_64
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build psycopg Docker image
        run: |
          docker build \
            --tag "psycopg:${INPUTS_VERSION}" \
            --build-arg DEBIAN_RELEASE="${DEBIAN_RELEASE}" \
            --build-arg PSYCOPG_VERSION="${INPUTS_VERSION}" \
            --file psycopg.dockerfile \
            --progress plain \
            .
      - name: Extract built wheels
        run: |
          image_id=$(docker create "psycopg:${INPUTS_VERSION}")
          mkdir -v -p outputs/psycopg
          docker cp "${image_id}":/usr/src/psycopg/ outputs/

          # List built files for verification
          find outputs/psycopg -type f -name "*.whl" -o -name "*.tar.gz" | sort
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: psycopg-wheels-${{ inputs.version }}-${{ matrix.arch }}
          path: outputs/psycopg/
          retention-days: 7
  create-release:
    if: ${{ !inputs.testing }}
    needs: build-psycopg
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/
      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts
          find artifacts/ -name "*.whl" -o -name "*.tar.gz" | while read file; do
            cp "$file" release-artifacts/
          done
          ls -la release-artifacts/
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="psycopg-${{ env.DEBIAN_RELEASE }}-${{ inputs.version }}"
          NOTES=$(cat <<EOF
          ## Psycopg ${{ inputs.version }} Multi-architecture Wheels
          **Version:** ${{ inputs.version }}
          **Build Date:** ${{ steps.date.outputs.date }}
          **Commit:** ${{ github.sha }}
          **Actor:** ${{ github.actor }}
          EOF
          )
          if gh release view "${TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "${TAG}" release-artifacts/* --clobber --repo "${{ github.repository }}"
          else
            gh release create "${TAG}" \
              --repo "${{ github.repository }}" \
              --target "${{ github.sha }}" \
              --title "Psycopg ${{ inputs.version }} (Multi-arch)" \
              --prerelease \
              --notes "${NOTES}" \
              release-artifacts/*
          fi
